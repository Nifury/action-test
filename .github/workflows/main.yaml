name: CI
on:
  push:
    tags:
      - '*'

jobs:
  build-1:
    runs-on: windows-2022
    steps:
      - name: Create files
        shell: pwsh
        run: |
          $urls = @(
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_installer_arm64.exe",
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_installer_x64.exe",
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_installer_x86.exe",
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_windows_arm64.zip",
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_windows_x64.zip",
            "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/146.0.7680.71-1.1/ungoogled-chromium_146.0.7680.71-1.1_windows_x86.zip"
          )
          foreach ($url in $urls) {
            $file = (Split-Path $url -Leaf) -replace '\.71', '.97'
            Invoke-WebRequest -Uri $url -OutFile $file
          }
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ungoogled-chromium*

  publish-release:
    needs: [build-1]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Publish release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            ungoogled-chromium*
    outputs:
      assets: ${{ steps.publish.outputs.assets }}
  update-binaries:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ungoogled-chromium-windows
        uses: actions/checkout@v3
        with:
          path: ungoogled-chromium-windows
      - name: Checkout ungoogled-chromium-binaries
        uses: actions/checkout@v3
        with:
          repository: Nifury/ungoogled-chromium-binaries
          token: ${{ secrets.PAT }}
          path: ungoogled-chromium-binaries
      - name: Rebase onto upstream master
        working-directory: ungoogled-chromium-binaries
        run: |
          git remote add upstream https://github.com/ungoogled-software/ungoogled-chromium-binaries.git
          git fetch upstream
          git rebase upstream/master
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run gen.py
        working-directory: ungoogled-chromium-binaries
        run: python ../ungoogled-chromium-windows/.github/scripts/gen.py
      - name: Commit and push
        working-directory: ungoogled-chromium-binaries
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add config/platforms/windows/
          git commit -m "Update Windows binaries for ${{ github.ref_name }}"
          git push --force-with-lease
      - name: Create pull request
        working-directory: ungoogled-chromium-binaries
        run: |
          gh pr create \
            --repo ungoogled-software/ungoogled-chromium-binaries \
            --head Nifury:master \
            --base master \
            --title "Update Windows binaries for ${{ github.ref_name }}" \
            --body "Automated update of Windows binary hashes for release ${{ github.ref_name }}."
        env:
          GH_TOKEN: ${{ secrets.PAT }}
